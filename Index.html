<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smith Chart Tunnel Reactive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ffff; }
        canvas { display: block; transition: transform 0.1s ease-out; }
    </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

const vertexShader = `
varying vec2 vUv;
void main(){
    vUv = uv;
    gl_Position = vec4(position, 1.0);
}
`;

const fragmentShader = `
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
varying vec2 vUv;

float circle(vec2 uv, vec2 center, float radius, float thickness){
    float d = length(uv - center);
    return smoothstep(thickness, 0.0, abs(d - radius));
}

float pointGlow(vec2 uv, vec2 pos, float size){
    float d = length(uv - pos);
    return smoothstep(size, 0.0, d);
}

vec3 drawSmith(vec2 uv){
    vec3 c = vec3(0.0);
    float mask = smoothstep(1.0, 0.98, length(uv));
    c += circle(uv, vec2(0.0), 1.0, 0.01) * vec3(0.0, 0.8, 1.0);

    float res[3]; res[0]=0.5; res[1]=1.0; res[2]=2.0;
    for(int i=0; i<3; i++){
        float r = res[i];
        float radius = 1.0/(r+1.0);
        float cx = r/(r+1.0);
        c += circle(uv, vec2(cx, 0.0), radius, 0.004) * vec3(0.0, 0.5, 0.7);
    }

    float xval[2]; xval[0]=1.0; xval[1]=2.0;
    for(int i=0; i<2; i++){
        float x = xval[i];
        float radius = 1.0/x;
        c += circle(uv, vec2(1.0, radius), radius, 0.004) * vec3(0.0, 0.4, 0.6) * mask;
        c += circle(uv, vec2(1.0, -radius), radius, 0.004) * vec3(0.0, 0.4, 0.6) * mask;
    }
    return c * mask;
}

void main(){
    vec2 uv = (vUv - 0.5) * 2.0;
    uv.x *= u_resolution.x / u_resolution.y;
    
    vec2 mouse = (u_mouse / u_resolution - 0.5) * 2.0;

    vec3 color = vec3(0.01, 0.03, 0.06);
    float speed = u_time * 0.3;

    // Punto base pseudoaleatorio fijo
    vec2 randomBase = vec2(
        sin(10.0) * 0.0,
        cos(25.0) * 0.0
    );

    for(int i=0; i<6; i++){
        float layer = float(i);
        float depth = fract(speed + layer/6.0);
        float scale = mix(3.0, 0.3, depth);
        
        vec2 suv = (uv + mouse * (1.0 - depth) * 0.2) * scale;
        float fade = 1.0 - depth;

        // Dibujar carta
        color += drawSmith(suv) * fade * 0.6;

        // ---- PUNTO VIAJERO ----
        vec2 movingPoint = randomBase * scale;

        float glow = pointGlow(suv, movingPoint, 0.03) * fade;
       
       ///---DEfine color punto
         // color += vec3(1.0, 0.2, 0.1) * glow * 1.0;
          
          vec3 dynamicColor = vec3(
        0.5 + 0.5*sin(u_time),
        0.5 + 0.5*sin(u_time + 2.0),
        0.5 + 0.5*sin(u_time + 4.0)
          );

    color += dynamicColor * glow * 1.0;
          
    }

    gl_FragColor = vec4(color, 1.0);
}
`;

// Configuración de Escena
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const uniforms = {
    u_time: { value: 0 },
    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    u_mouse: { value: new THREE.Vector2(0, 0) }
};

const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader,
    fragmentShader
});

const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(mesh);

// --- Manejadores de Eventos ---

const handleResize = () => {
    const width = window.innerWidth;
    const height = window.innerHeight;
    renderer.setSize(width, height);
    uniforms.u_resolution.value.set(width, height);
    // Nota: OrthographicCamera no necesita aspect ratio en este setup de (-1,1)
};

const handleMouseMove = (e) => {
    // 1. Actualizar Uniforms para el Shader
    uniforms.u_mouse.value.set(e.clientX, window.innerHeight - e.clientY);

    // 2. Efecto de rotación CSS en el Canvas
  //  const x = (window.innerWidth / 2 - e.clientX) / 50; // Factor suavizado
    const y = (window.innerHeight / 2 - e.clientY) / 50;
    renderer.domElement.style.transform = `perspective(1000px) rotateY(${-x}deg) rotateX(${y}deg)`;
};

window.addEventListener("resize", handleResize);
document.addEventListener("mousemove", handleMouseMove);

function animate(t) {
    uniforms.u_time.value = t * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
